# Automatically create a PR when submodules are updated
# Triggered via repository_dispatch or on a schedule to pick up my-papers changes

name: submodule-update-pr

on:
  repository_dispatch:
    types: [submodule-update]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: false
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Create update branch and PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH_NAME="update-submodules-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME

          # Update all submodules
          git submodule update --init --recursive
          git submodule update --remote my-cv-data
          git submodule update --remote my-papers

          # Check if there are changes
          if git diff --quiet --submodule; then
            echo "No submodule changes detected"
            exit 0
          fi

          # Commit and push
          git add my-cv-data my-papers
          git commit -m "Update submodules

          Triggered by: ${{ github.event.client_payload.ref || github.event_name }}"
          git push origin $BRANCH_NAME

          # Create PR
          gh pr create \
            --title "Update submodules" \
            --body "Automated PR to update submodules (my-cv-data, my-papers).

          Triggered by: \`${{ github.event.client_payload.ref || github.event_name }}\`

          **Please review and merge if tests pass.**" \
            --base main \
            --head $BRANCH_NAME
