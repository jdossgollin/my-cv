# Build CV PDF and deploy to GitHub Pages
# Runs tests first, then builds and deploys

name: build-cv-pdf

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Run tests first
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: false

      - name: Update public bibliography submodule
        run: git submodule update --init --recursive my-papers

      - name: Update private CV data submodule
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive my-cv-data

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run Tests
        run: uv run pytest tests/ -v --tb=short

  # Build PDF only after tests pass
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: false  # Don't auto-checkout submodules
      - name: Update public bibliography submodule
        run: git submodule update --init --recursive my-papers
      - name: Update private CV data submodule
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive my-cv-data
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Generate Templates
        run: uv run python generate_cv.py
      - name: Build CV PDF
        uses: xu-cheng/latex-action@v2
        with:
          root_file: Doss-Gollin-CV.tex
          args: "-bibtex-cond1 -pdfxe"
          post_compile: "latexmk -c"
          working_directory: "temp_output"
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./temp_output
          publish_branch: gh-pages
          keep_files: false
